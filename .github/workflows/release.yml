name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmt-check

      - name: Run go vet
        run: make vet

      - name: Run tests
        run: make test

  build:
    needs: test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            asset_name: whale-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: whale-darwin-arm64
          - goos: linux
            goarch: amd64
            asset_name: whale-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: whale-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p dist
          go build -ldflags "-X github.com/usewhale/whale/internal/build.Version=${VERSION}" -o "dist/${{ matrix.asset_name }}" ./cmd/whale

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -type f -maxdepth 2 ! -name "checksums.txt" -exec sha256sum {} \; | sed 's#^\([0-9a-f]\+\)  \./#\1  #' > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/**/whale-*
            dist/checksums.txt
